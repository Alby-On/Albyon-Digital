<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Mantención</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold uppercase tracking-wider">
                <i class="fas fa-tools mr-2"></i> Plan de Mantención
            </h1>
            <span class="text-sm bg-blue-800 px-3 py-1 rounded-full">Usuario: Jaime Alfredo</span>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8">
        
        <section class="bg-white rounded-xl shadow-md p-6 mb-8">
            <div class="flex items-center justify-between mb-6 border-b pb-2">
                <h2 class="text-2xl font-semibold text-gray-800">Registrar Nuevo Equipo</h2>
                <i class="fas fa-plus-circle text-blue-600 text-2xl"></i>
            </div>

            <form id="form-equipo" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Código Inventario PeopleSoft</label>
                    <input type="text" id="codigo_peoplesoft" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Equipo</label>
                    <input type="text" id="nombre_equipo" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Área Académica</label>
                    <select id="instructivo_area" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        <option value="Automatización, Electrónica y Robotica">Automatización, Electrónica y Robotica</option>
                        <option value="Energia">Energia</option>
                        <option value="Mecanica (Mecatronica)">Mecanica (Mecatronica)</option>
                    </select>
                </div>

                <div class="lg:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Especificación Técnica Detallada</label>
                    <textarea id="especificacion_tecnica" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="Marca, modelo y estándares..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Lugar de Almacenamiento</label>
                    <select id="lugar" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border font-bold text-blue-700">
                        <option value="Pañol">Pañol</option>
                        <option value="TIED">TIED</option>
                        <option value="LEE">LEE</option>
                        <option value="LPMB">LPMB</option>
                        <option value="TIC">TIC</option>
                        <option value="LCEM">LCEM</option>
                        <option value="LAU">LAU</option>
                        <option value="LCP">LCP</option>
                        <option value="LUM">LUM</option>
                        <option value="LEDM">LEDM</option>
                        <option value="Patio didactico">Patio didáctico</option>
                        <option value="Externos">Externos</option>
                    </select>
                </div>

                <div class="lg:col-span-3">
                    <label class="block text-sm font-medium text-gray-700">Actividad Realizada</label>
                    <textarea id="actividad" rows="2" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="Describe el mantenimiento realizado..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Prioridad</label>
                    <select id="prioridad" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        <option value="A">Prioridad A (Semestral)</option>
                        <option value="B">Prioridad B (Semestral)</option>
                        <option value="C">Prioridad C (Anual)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Frecuencia</label>
                    <select id="frecuencia" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        <option value="Semestral">Semestral</option>
                        <option value="Anual">Anual</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Realizada por (Técnico)</label>
                    <input type="text" id="realizada_por" value="Jaime Alfredo Jimenez Saldaña" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-gray-50">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Fecha Mantención Realizada</label>
                    <input type="date" id="ultima_mantencion" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 italic text-blue-600">Vencimiento Calculado</label>
                    <input type="date" id="vencimiento_calibracion" readonly class="mt-1 block w-full rounded-md border-gray-100 shadow-sm p-2 border bg-blue-50 font-bold">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-gray-600">Existencias</label>
                        <input type="number" id="existencias_reales" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" value="0">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600">Estándar</label>
                        <input type="number" id="existencias_estandar" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" value="0">
                    </div>
                </div>

                <div class="lg:col-span-3 flex justify-end gap-4 mt-4">
                    <button type="submit" class="px-6 py-2 bg-blue-700 text-white rounded-lg hover:bg-blue-800 transition shadow-lg w-full md:w-auto">
                        <i class="fas fa-save mr-2"></i> Guardar y Calcular Vencimiento
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">Listado de Equipos y Trazabilidad</h2>
                <div class="relative">
                    <input type="text" placeholder="Buscar equipo..." class="pl-10 pr-4 py-2 border rounded-full text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <i class="fas fa-search absolute left-3 top-2.5 text-gray-400"></i>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
                        <tr>
                            <th class="p-4 border-b">Equipo / Especificación</th>
                            <th class="p-4 border-b">Ubicación</th>
                            <th class="p-4 border-b">Prioridad</th>
                            <th class="p-4 border-b">Última Mantención</th>
                            <th class="p-4 border-b">Estado/Brecha</th>
                            <th class="p-4 border-b">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo" class="text-gray-700 text-sm">
                        </tbody>
                </table>
            </div>
        </section>

    </main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
