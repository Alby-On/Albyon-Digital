<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Equipos - JOSCAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <div id="notification-container" class="fixed top-5 right-5 z-50"></div>

    <nav class="bg-blue-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold uppercase tracking-wider">
                <i class="fas fa-plus-circle mr-2"></i> Registro de Equipos
            </h1>
            <div class="flex items-center gap-4">
                <a href="menu.html" class="text-sm bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded-full transition">
                    <i class="fas fa-home mr-1"></i> Menú
                </a>
                <span class="text-sm bg-blue-800 px-3 py-1 rounded-full">Jaime Alfredo</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8">
        
        <section class="bg-white rounded-xl shadow-md p-6 mb-8 max-w-5xl mx-auto">
            <div class="flex items-center justify-between mb-6 border-b pb-2">
                <h2 class="text-2xl font-semibold text-gray-800">Ingresar Nuevo Activo</h2>
                <i class="fas fa-edit text-blue-600 text-2xl"></i>
            </div>

            <form id="form-equipo" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Código Inventario PeopleSoft</label>
                    <input type="text" id="codigo_peoplesoft" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Equipo</label>
                    <input type="text" id="nombre_equipo" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500" placeholder="Ej: Osciloscopio">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Área Académica</label>
                    <select id="instructivo_area" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        <option value="Automatización, Electrónica y Robotica">Automatización, Electrónica y Robotica</option>
                        <option value="Energia">Energia</option>
                        <option value="Mecanica (Mecatronica)">Mecanica (Mecatronica)</option>
                    </select>
                </div>

                <div class="lg:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Especificación Técnica Detallada</label>
                    <textarea id="especificacion_tecnica" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="Marca, modelo y estándares..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Lugar de Almacenamiento</label>
                    <select id="lugar" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border font-bold text-blue-700">
                        <option value="Pañol">Pañol</option>
                        <option value="TIED">TIED</option>
                        <option value="LEE">LEE</option>
                        <option value="LPMB">LPMB</option>
                        <option value="TIC">TIC</option>
                        <option value="LCEM">LCEM</option>
                        <option value="LAU">LAU</option>
                        <option value="LCP">LCP</option>
                        <option value="LUM">LUM</option>
                        <option value="LEDM">LEDM</option>
                        <option value="Patio didactico">Patio didáctico</option>
                        <option value="Externos">Externos</option>
                    </select>
                </div>

                <div class="lg:col-span-3">
                    <label class="block text-sm font-medium text-gray-700">Actividad Realizada</label>
                    <textarea id="actividad" rows="2" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="Descripción de la última mantención..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Prioridad</label>
                    <select id="prioridad" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        <option value="A">Prioridad A (Semestral)</option>
                        <option value="B">Prioridad B (Semestral)</option>
                        <option value="C">Prioridad C (Anual)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Frecuencia</label>
                    <select id="frecuencia" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        <option value="Semestral">Semestral</option>
                        <option value="Anual">Anual</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Realizada por (Técnico)</label>
                    <input type="text" id="realizada_por" value="Jaime Alfredo Jimenez Saldaña" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-gray-50 font-semibold" readonly>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 font-bold">Fecha Mantención Realizada</label>
                    <input type="date" id="ultima_mantencion" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border border-blue-300">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 italic text-blue-600 font-bold">Vencimiento Calculado</label>
                    <input type="date" id="vencimiento_calibracion" readonly class="mt-1 block w-full rounded-md border-gray-100 shadow-sm p-2 border bg-blue-50 font-bold text-blue-700">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase">Existencias</label>
                        <input type="number" id="existencias_reales" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" value="1">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase">Estándar</label>
                        <input type="number" id="existencias_estandar" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" value="1">
                    </div>
                </div>

                <div class="lg:col-span-3 flex justify-end gap-4 mt-6">
                    <button type="reset" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        Limpiar Datos
                    </button>
                    <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition shadow-lg flex items-center gap-2">
                        <i class="fas fa-check"></i> Registrar Equipo
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
